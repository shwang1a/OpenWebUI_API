        function generatePPT() {
            //擷取簡報文字稿從"[報頭]"之後至"[報尾]"之前的內容,不含這兩個標籤
            const pptRegex = /\[報頭\]([\s\S]*?)\[報尾\]/;
            const pptMatch = rawMarkdown.match(pptRegex);
            const pptContent = pptMatch ? pptMatch[1].trim() : null;
            if (!pptContent) {
                alert("無法找到簡報內容，請確認 AI 回應格式是否正確。");
                return;
            }

            // 檢查函式庫是否載入成功
            if (typeof PptxGenJS === 'undefined') {
                alert('函式庫尚未載入完成，請檢查網路連線或 CDN 連結。');
                return;
            }

            // 1. 初始化 PptxGenJS
            let pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_16x9';

            // 2. 切分頁面 (根據 --- 符號)
            const pages = pptContent.split('---');

            pages.forEach((pageContent, index) => {
                let slide = pptx.addSlide();

                // 提取標題 (假設格式為 ## 第X頁｜標題)
                const titleMatch = pageContent.match(/## .*?｜(.*)/);
                const titleText = titleMatch ? titleMatch[1].trim() : "簡報頁 " + (index + 1);

                // 提取講稿 (備註欄)
                const noteMatch = pageContent.match(/\*\*講稿：\*\*([\s\S]*)/);
                const notes = noteMatch ? noteMatch[1].trim() : "";

                // 設定標題樣式
                slide.addText(titleText, {
                    x: 0.5, y: 0.5, w: '90%', h: 1,
                    fontSize: 32, bold: true, color: '363636', valign: 'middle'
                });

                // 提取主體內容 (過濾掉標題和講稿的部分)
                let bodyContent = pageContent
                    .replace(/## .*/, '') // 刪除標題行
                    .replace(/\*\*講稿：\*\*[\s\S]*/, '') // 刪除講稿部分
                    .replace(/\*\*(.*?)\*\*/g, '$1') // 去除粗體 Markdown 標籤
                    .trim();

                // 將內容按行分割並處理成條目
                let lines = bodyContent.split('\n').filter(line => line.trim() !== '');

                if (index === 0) {
                    // 第一頁特殊處理：標題頁佈局
                    slide.addText(bodyContent, {
                        x: 0.5, y: 2, w: '90%', h: 3,
                        fontSize: 20, align: 'center', color: '666666'
                    });
                } else {
                    // 普通頁：清單佈局
                    let bulletPoints = lines.map(line => {
                        return { text: line.replace(/^- /, '').trim(), options: { bullet: true, margin: [5, 0, 5, 0] } };
                    });

                    slide.addText(bulletPoints, {
                        x: 0.5, y: 1.5, w: '90%', h: 4,
                        fontSize: 18, color: '444444', valign: 'top'
                    });
                }

                // 加入講稿到備註欄 (Notes)
                slide.addNotes(notes);
            });

            // 3. 儲存檔案
            pptx.writeFile({ fileName: `PBDEs_檢測成果報告_2026.pptx` });
        }
    </script>
