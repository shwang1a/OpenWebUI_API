<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>顯示 OpenAI b64_json 圖片</title>

<style>
body{
    font-family:Arial, Helvetica, sans-serif;
    max-width:1000px;
    margin:auto;
    padding:30px;
    background:#f5f5f5;
}
h2{
    margin-bottom:20px;
}
textarea{
    width:100%;
    height:260px;
    font-size:14px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    padding:12px 20px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}
.card{
    margin-top:25px;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
img{
    max-width:100%;
    border:1px solid #ddd;
    border-radius:8px;
}
#msg{
    color:red;
    margin-top:15px;
}
</style>
</head>

<body>

<h2>OpenAI API 回傳 b64_json 顯示圖片</h2>

<p>請貼上完整 JSON 回傳內容：</p>

<textarea id="jsonInput" placeholder='貼上 API 回傳 JSON'></textarea>

<br>
<button onclick="showImage()">顯示圖片</button>

<div id="msg"></div>

<div class="card">
    <img id="resultImage">
</div>

<script>
function showImage(){

    const input = document.getElementById("jsonInput").value.trim();
    const msg = document.getElementById("msg");
    const img = document.getElementById("resultImage");

    msg.innerText = "";
    img.src = "";

    if(!input){
        msg.innerText = "請先貼上 JSON";
        return;
    }

    try{

        const data = JSON.parse(input);

        if(
            data.data &&
            data.data.length > 0 &&
            data.data[0].b64_json
        ){

            const base64 = data.data[0].b64_json;

            img.src = "data:image/png;base64," + base64;

        }else{
            msg.innerText = "找不到 data[0].b64_json";
        }

    }catch(e){
        msg.innerText = "JSON 格式錯誤";
        console.error(e);
    }
}
</script>

</body>
</html>
