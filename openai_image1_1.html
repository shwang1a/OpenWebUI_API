<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>AI 資訊圖表產生器</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        textarea {
            width: 100%;
            height: 220px;
            font-size: 16px;
            padding: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            margin-top: 15px;
            cursor: pointer;
        }

        img {
            width: 100%;
            margin-top: 30px;
            border: 1px solid #ccc;
        }

        #loading {
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>OpenAI Image2 資訊圖表產生器</h2>

    <textarea id="content" placeholder="貼上報告文字..."></textarea>
    <br>
    <button onclick="generate()">產生資訊圖表</button>

    <p id="loading"></p>


    <script>
        const apiKey = "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";

        async function generate() {

            let text = document.getElementById("content").value;

            if (!text) {
                alert("請貼上內容");
                return;
            }

            document.getElementById("loading").innerText = "產圖中，請稍候...";


            let prompt = `
請根據以下內容，產生專業資訊圖表，使用繁體中文；僅使用大號粗體清晰易讀的中文文字。盡量減少文字量。避免使用小段落。

內容：
${text}

風格要求：
1. 政府報告風格
2. 現代簡潔
3. 含圖示、流程圖、數據圖表
4. 配色藍綠色系
5. 高品質 infographic
`;

            const response = await fetch("https://api.openai.com/v1/images/generations", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + apiKey
                },
                body: JSON.stringify({
                    model: "gpt-image-2",
                    prompt: prompt,
                    size: "1024x1024"
                })
            });

            const data = await response.json();

            document.getElementById("loading").innerText = "";

            if (data.data) {
                // data.data 為b64_json格式,自動下載檔案
                //  data ={
                // "created": 1777249949,
                //     "background": "opaque",
                //         "data": [
                //             {
                //                 "b64_json": "iVBORw0KGgoAAAANSU....."
                //             }
                //         ],
                //             "output_format": "png",
                //                 "quality": "high",
                //                     "size": "1024x1024",
                //                         "usage": {
                //     "input_tokens": 14,
                //         "input_tokens_details": {
                //         "image_tokens": 0,
                //             "text_tokens": 14
                //     },
                //     "output_tokens": 4160,
                //         "output_tokens_details": {
                //         "image_tokens": 4160,
                //             "text_tokens": 0
                //     },
                //     "total_tokens": 4174
                // }
                // }
                const b64_json = data.data[0].b64_json;
                const link = document.createElement("a");
                link.href = "data:image/png;base64," + b64_json;
                link.download = "infographic.png";
                document.body.appendChild(link);
                link.click();
            } else {
                alert(JSON.stringify(data));
            }
        }
    </script>

</body>

</html>
